<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <rect width="1180" height="520" fill="#ffffff"/>
  <text x="40" y="48" font-size="26" font-weight="600" fill="#1f2937">Print Order Intake — n8n workflow</text>
  <text x="40" y="76" font-size="15" fill="#6b7280">A customer brief arrives, the AI extractor structures it, the order is logged to a sheet, and the customer is emailed a confirmation.</text>

  <!-- styles via inline attributes -->
  <!-- Row of nodes -->
  <g>
    <!-- Webhook -->
    <rect x="40" y="150" width="170" height="90" rx="12" fill="#eef2ff" stroke="#6366f1" stroke-width="2"/>
    <text x="125" y="185" text-anchor="middle" font-size="15" font-weight="600" fill="#3730a3">Order Webhook</text>
    <text x="125" y="208" text-anchor="middle" font-size="12" fill="#4b5563">POST /order-intake</text>
    <text x="125" y="225" text-anchor="middle" font-size="12" fill="#4b5563">brief + customer</text>

    <!-- HTTP Extract -->
    <rect x="250" y="150" width="190" height="90" rx="12" fill="#ecfdf5" stroke="#10b981" stroke-width="2"/>
    <text x="345" y="182" text-anchor="middle" font-size="15" font-weight="600" fill="#065f46">Extract Fields</text>
    <text x="345" y="202" text-anchor="middle" font-size="12" fill="#4b5563">HTTP Request to the</text>
    <text x="345" y="219" text-anchor="middle" font-size="12" fill="#4b5563">Experiment 1 model</text>

    <!-- Set -->
    <rect x="480" y="150" width="170" height="90" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
    <text x="565" y="185" text-anchor="middle" font-size="15" font-weight="600" fill="#9a3412">Assemble Record</text>
    <text x="565" y="208" text-anchor="middle" font-size="12" fill="#4b5563">shape the row,</text>
    <text x="565" y="225" text-anchor="middle" font-size="12" fill="#4b5563">add timestamp</text>

    <!-- Sheets -->
    <rect x="690" y="150" width="170" height="90" rx="12" fill="#ecfeff" stroke="#06b6d4" stroke-width="2"/>
    <text x="775" y="185" text-anchor="middle" font-size="15" font-weight="600" fill="#155e75">Google Sheet</text>
    <text x="775" y="208" text-anchor="middle" font-size="12" fill="#4b5563">append order row</text>
    <text x="775" y="225" text-anchor="middle" font-size="12" fill="#4b5563">(data capture)</text>

    <!-- Gmail -->
    <rect x="900" y="150" width="170" height="90" rx="12" fill="#fef2f2" stroke="#ef4444" stroke-width="2"/>
    <text x="985" y="185" text-anchor="middle" font-size="15" font-weight="600" fill="#991b1b">Send Confirmation</text>
    <text x="985" y="208" text-anchor="middle" font-size="12" fill="#4b5563">email the customer</text>
    <text x="985" y="225" text-anchor="middle" font-size="12" fill="#4b5563">a summary</text>
  </g>

  <!-- Respond node centered below -->
  <rect x="470" y="340" width="190" height="80" rx="12" fill="#f3f4f6" stroke="#9ca3af" stroke-width="2"/>
  <text x="565" y="372" text-anchor="middle" font-size="15" font-weight="600" fill="#374151">Respond to Caller</text>
  <text x="565" y="395" text-anchor="middle" font-size="12" fill="#4b5563">return status + order JSON</text>

  <!-- External: extractor API box -->
  <rect x="250" y="340" width="190" height="80" rx="12" fill="#ffffff" stroke="#10b981" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="345" y="368" text-anchor="middle" font-size="14" font-weight="600" fill="#065f46">Extractor API</text>
  <text x="345" y="388" text-anchor="middle" font-size="11.5" fill="#4b5563">FastAPI + local GGUF</text>
  <text x="345" y="404" text-anchor="middle" font-size="11.5" fill="#4b5563">host.docker.internal:8000</text>

  <!-- Arrows between nodes -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <g stroke="#9ca3af" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="210" y1="195" x2="248" y2="195"/>
    <line x1="440" y1="195" x2="478" y2="195"/>
    <line x1="650" y1="195" x2="688" y2="195"/>
    <line x1="860" y1="195" x2="898" y2="195"/>
    <!-- Gmail down to Respond -->
    <path d="M985,240 L985,300 L660,300 L620,338"/>
  </g>

  <!-- HTTP node down to API and back -->
  <g stroke="#10b981" stroke-width="2" fill="none" marker-end="url(#arrow)">
    <line x1="345" y1="240" x2="345" y2="338"/>
  </g>
  <g stroke="#10b981" stroke-width="2" stroke-dasharray="5 4" fill="none" marker-end="url(#arrow)">
    <path d="M400,340 L400,270 L380,242"/>
  </g>
  <text x="455" y="300" font-size="11" fill="#065f46">structured fields back</text>

  <text x="40" y="470" font-size="13" fill="#6b7280">Free and local: n8n self-hosted in Docker, extraction by the Experiment 1 model on your own GPU. The only cloud pieces are the Google Sheet and the confirmation email.</text>
</svg>
