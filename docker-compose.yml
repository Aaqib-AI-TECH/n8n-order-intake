services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - GENERIC_TIMEZONE=Europe/London
      - TZ=Europe/London
      # Allows http://localhost access without an https certificate.
      - N8N_SECURE_COOKIE=false
    volumes:
      - n8n_data:/home/node/.n8n
    # Lets the workflow reach a service running on your machine (the extractor
    # API) at http://host.docker.internal:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  n8n_data:
